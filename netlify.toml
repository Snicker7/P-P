[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-lighthouse"

  [plugins.inputs]
    output_path = "reports/lighthouse.html"

  [plugins.inputs.thresholds]
    performance = 0.9
    accessibility = 0.9
    best-practices = 0.9
    seo = 0.95

  [[plugins.inputs.audits]]
    path = "/"
    output_path = "reports/lighthouse-home.html"

  [[plugins.inputs.audits]]
    path = "/about"
    output_path = "reports/lighthouse-about.html"

  [[plugins.inputs.audits]]
    path = "/portfolio"
    output_path = "reports/lighthouse-portfolio.html"

  [[plugins.inputs.audits]]
    path = "/journal"
    output_path = "reports/lighthouse-journal.html"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
